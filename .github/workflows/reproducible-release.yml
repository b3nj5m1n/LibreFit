name: Reproducible Release
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*' # Triggers only pushing a tag like v1.0.0

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to upload files to Releases

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      # Setup Docker environment
      - name: Build Docker image
        run: docker build -t android-repro-check -f Dockerfile.build .

      - name: Build unsigned APK
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh

      # Prepare Keystore from Secrets
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.jks

      - name: Sign release
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
        run: |
          chmod +x scripts/sign-release.sh
          ./scripts/sign-release.sh

      # This is just for testing the manual run
      - name: Upload artifacts if not releasing
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          path: |
            apks/LibreFit-unsigned.apk
            apks/LibreFit.apk

      # It extracts notes from CHANGELOG.md by default
      - name: Extract release notes
        id: extract_notes
        uses: ffurrer2/extract-release-notes@v2

      - name: Create release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            apks/LibreFit-unsigned.apk
            apks/LibreFit.apk
          body: ${{ steps.extract_notes.outputs.release_notes }}
          append_body: true # List new contributors